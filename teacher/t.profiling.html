<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Profiling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="t.profiling.css">
</head>
<body>
    <div class="container">
        <div class="back-button">
            <img src="../assets/Back.png" alt="Back">
        </div>
        <div class="center">
            <div class="hex-wrap">
            <div class="hex-left"></div>
            <div class="hex-mid">
                <div class="hex-container">
                    <div class="title">
                        <h1>WELCOME TO</h1>
                        <img src="../Title.png" class="title-image" alt="Logo">
                        <h2>Where Teamwork Thrives!</h2>
                    </div>
                    <div class="selection">
                        <h1>Let's get you started...</h1>
                    </div>
                        <div class="info">
                            <div class="info-title">
                                <h2>Professor</h2>
                            </div>
                            <div class="info-card">
                                <div class="info-content">
                                    <div class="profile-image">
                                        <img id="profilePicPreview" src="../assets/profile.png" alt="Profile">
                                        <div class="edit-profile">
                                            <button type="button" id="editProfilePicBtn" aria-label="Change profile picture"><img src="../assets/Edit.png" alt="Edit"></button>
                                        </div>
                                        <input type="file" id="profilePicInput" accept="image/*" hidden>
                                    </div>
                                    <div class="profile-info">
                                        <div class="display-name">
                                            <input type="text" id="displayNameInput" placeholder="Enter your Display Name" required>
                                        </div>
                                        <div class="select-program">
                                            <select name="program" id="program" placeholder="Select Program">
                                                <option value="">Select Department</option>
                                                <option value="College of Computer Studies">College of Computer Studies</option>
                                                <option value="College of Education, Arts, and Sciences">College of Education, Arts, and Sciences</option>
                                                <option value="College of Hospitality and Tourism Management">College of Hospitality and Tourism Management</option>
                                                <option value="College of Business Administration">College of Business Administration</option>
                                                <option value="College of Allied Health Sciences">College of Allied Health Sciences</option>
                                                <option value="Personal/Private">Personal/Private</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="save-button">
                                <button>Save</button>
                            </div>
                        </div>
                </div>
            </div>
            <div class="hex-right"></div>
            </div>
        </div>
    </div>
    <script src="t.profiling.js"></script>
</body>
</html>
