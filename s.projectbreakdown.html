<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Breakdown</title>
    <link rel="stylesheet" href="s.projectbreakdown.css">
</head>
<body>
    <div class="topbar">
        <button class="menu-btn" id="topBackBtn" type="button" aria-label="Back to dashboard">
            <img src="assets/Back.png" alt="Back icon">
        </button>
        <p class="datetime">6:00 PM February 01, 2026</p>
    </div>

    <div class="layout">
        <aside class="sidebar">
            <div class="profile-block">
                <div class="avatar-circle">
                    <img src="assets/profile.png" alt="Profile">
                </div>
                <h3>Name</h3>
                <h3>Email</h3>
                <a href="#" class="profile-link">Manage Profile</a>
            </div>

            <div class="sidebar-actions">
                <button class="btn settings" type="button">Settings</button>
                <button class="btn logout" type="button">Log Out</button>
            </div>
        </aside>

        <main class="main-content-container">
            <div class="main-header">
                <h1 class="main-content-title">PROJECT BREAKDOWN</h1>

                <div class="header-actions">
                    <button class="action-btn post-task-btn" type="button">
                        <span class="post-task-icon">
                            <img src="assets/Plus.png" alt="Plus icon">
                        </span>
                        <span>Post Task</span>
                    </button>
                </div>
            </div>

            <section class="main-content">
                <section class="summary-row">
                    <article class="summary-card">
                        <p class="summary-label">My Tasks</p>
                        <h3>1</h3>
                    </article>

                    <article class="summary-card">
                        <p class="summary-label">Other Tasks</p>
                        <h3>1</h3>
                    </article>

                    <article class="summary-card">
                        <p class="summary-label">Pending Verify</p>
                        <h3>1</h3>
                    </article>
                </section>

                <section class="task-section">
                    <div class="section-title-wrap">
                        <h2>Your Task(s)</h2>
                    </div>

                    <article class="task-card">
                        <div class="task-left">
                            <h3>Task: Create a slide</h3>
                            <p>
                                Assignee(s):
                                <span class="assignee-dot"><img src="assets/Info.png" alt="Info icon"></span>
                                &nbsp; Due Date: ##:## -- ##/##/####
                            </p>
                        </div>

                        <button class="task-status inactive" type="button">Not Active</button>
                    </article>
                </section>

                <section class="task-section">
                    <div class="section-title-wrap">
                        <h2>Other Task(s)</h2>
                    </div>

                    <article class="task-card">
                        <div class="task-left">
                            <h3>Task: Create a slide</h3>
                            <p>
                                Assignee(s):
                                <span class="assignee-dot"><img src="assets/Info.png" alt="Info icon"></span>
                                &nbsp; Due Date: ##:## -- ##/##/####
                            </p>
                        </div>

                        <button class="task-status verify" type="button">Verify</button>
                    </article>
                </section>
            </section>
        </main>

        <aside class="right-rail">
            <nav class="side-tabs" aria-label="Group sections">
                <button class="tab tab-group-info" id="groupInfoTab" type="button">Group Information</button>
                <button class="tab tab-project-breakdown active" type="button">Project Breakdown</button>
            </nav>
        </aside>
    </div>

    <script src="s.projectbreakdown.js"></script>
</body>
</html>
