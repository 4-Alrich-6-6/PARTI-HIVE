<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profiling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="s.profiling.css">
</head>
<body>
    <div class="container">
        <div class="back-button">
            <img src="assets/Back.png" alt="Back">
        </div>
        <div class="center">
            <div class="hex-wrap">
            <div class="hex-left"></div>
            <div class="hex-mid">
                <div class="hex-container">
                    <div class="title">
                        <h1>WELCOME TO</h1>
                        <img src="Title.png" class="title-image" alt="Logo">
                        <h2>Where Teamwork Thrives!</h2>
                    </div>
                    <div class="selection">
                        <h1>Let's get you started...</h1>
                    </div>
                        <div class="info">
                            <div class="info-title">
                                <h2>Student</h2>
                            </div>
                            <div class="info-card">
                                <div class="info-content">
                                    <div class="profile-image">
                                        <img src="assets/profile.png" alt="Profile">
                                    </div>
                                    <div class="edit-profile">
                                        <button><img src="assets/Edit.png" alt="Edit"></button>
                                    </div>
                                    <div class="profile-info">
                                        <div class="display-name">
                                            <input type="text" placeholder="Enter your Display Name" required>
                                        </div>
                                        <div class="select-program">
                                            <select name="program" id="program">
                                                <option value="">Select Program</option>
                                                <option value="Computer Science">Computer Science</option>
                                                <option value="Information Technology">Information Technology</option>
                                                <option value="Game Development">EMC - Game Development</option>
                                                <option value="Digital Animation Technology">EMC - Digital Animation Technology</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="save-button">
                                <button>Save</button>
                            </div>
                        </div>
                </div>
            </div>
            <div class="hex-right"></div>
            </div>
        </div>
    </div>
    <script src="s.profiling.js"></script>
</body>
</html>
