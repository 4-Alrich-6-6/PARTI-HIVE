<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HIVE - Forget Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="log-sign.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <img src="../Logo.png" alt="HIVE logo" class="logo-image">
        </div>

        <div class="right">
            <header class="right-header">
                <div class="banner">
                    <img src="../Title.png" alt="HIVE title" class="title-image">
                    <p class="tagline">Where Teamwork Thrives!</p>
                </div>
            </header>

            <section class="form" aria-label="Forget password form">
                <div class="form-content">
                    <div class="back-button">
                        <a href="log-sign.html" id="backLink">
                            <img src="../assets/Back.png" alt="Back" class="back-icon">
                        </a>    
                    </div>
                    <div class="form-title">
                        <h2>Reset Password</h2>
                    </div>
                    <div class="form-description">
                        <p>Enter your email to receive an OTP...</p>
                    </div>
                    
                    <form id="step1Form" class="lForm active" autocomplete="on">
                        <div class="inputs">
                            <div class="form-group">
                                <label for="email">Enter your Email:</label>
                                <div class="email-wrapper">
                                    <input id="email" type="email" placeholder="youremail@yourdomain.com" required>
                                    <button type="button" id="sendOtpBtn" class="send-btn">Send</button>
                                </div>
                            </div>
                            <div class="form-group password-group">
                                <label for="otp">Enter OTP:</label>
                                <div class="password-wrapper">
                                    <input id="otp" type="text" class="otp-input" placeholder="123456" pattern="[0-9]{6}" maxlength="6" required>
                                </div>
                            </div>
                        </div>
                        <button class="submit" type="submit">Verify OTP</button>
                    </form>

                    <form id="step2Form" class="sForm" autocomplete="on" style="display: none;">
                        <div class="inputs">
                            <div class="form-group password-group">
                                <label for="newPass">New Password:</label>
                                <div class="password-wrapper">
                                    <input id="newPass" type="password" class="password-input" placeholder="************" minlength="6" required>
                                    <button class="toggle-password" type="button" aria-label="Toggle password visibility">
                                        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
                                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group password-group">
                                <label for="confirmPass">Confirm Password:</label>
                                <div class="password-wrapper">
                                    <input id="confirmPass" type="password" class="password-input" placeholder="************" minlength="6" required>
                                    <button class="toggle-password" type="button" aria-label="Toggle password visibility">
                                        <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
                                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zm0 12.5a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <button class="submit" type="submit">Reset Password</button>
                    </form>
                </div>
            </section>
        </div>
    </div>

    <script src="forget-password.js"></script>
</body>
</html>
