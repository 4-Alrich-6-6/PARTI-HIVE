<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Information</title>
    <link rel="stylesheet" href="s.leadergrpviewing.css">
</head>
<body>
    <div class="topbar">
        <button class="menu-btn" id="topBackBtn" type="button" aria-label="Back to dashboard">
            <img src="assets/Back.png" alt="Back icon">
        </button>
        <p class="datetime">6:00 PM February 01, 2026</p>
    </div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="profile-block">
                <div class="avatar-circle">
                    <img src="assets/profile.png" alt="Profile">
                </div>
                <h3>Name</h3>
                <h3>Email</h3>
                <a href="#" class="profile-link">Manage Profile</a>
            </div>

            <div class="sidebar-actions">
                <button class="btn settings" type="button">Settings</button>
                <button class="btn logout" type="button">Log Out</button>
            </div>
        </aside>

        <main class="main-content-container">
            <div class="main-header">
                <h1 class="main-content-title">GROUP INFORMATION</h1>

                <div class="header-actions">
                    <button class="icon-btn danger" id="backBtn" type="button" aria-label="Back">
                        <img src="assets/Leave.png" alt="Back icon">
                    </button>
                    <button class="action-btn" type="button">Add Members</button>
                    <button class="action-btn" type="button">Kick Members</button>
                </div>
            </div>

            <section class="main-content">
                <section class="summary-row">
                    <article class="summary-card">
                        <p class="summary-label">Teacher</p>
                        <h3>0</h3>
                    </article>

                    <article class="summary-card">
                        <p class="summary-label">Members</p>
                        <h3>3</h3>
                    </article>

                    <article class="summary-card">
                        <p class="summary-label">Leader</p>
                        <h3>1</h3>
                    </article>
                </section>

                <section class="group-label-wrap">
                    <div class="group-label">
                        <h2>Group Name</h2>
                        <p>Subject</p>
                    </div>
                </section>

                <section class="group-info-stack">
                    <article class="info-card teacher-card">
                        <div class="circle-avatar small"></div>
                        <h3>You currently have no teacher</h3>
                    </article>

                    <article class="info-card leader-card">
                        <div class="circle-avatar large"></div>
                        <div class="member-details">
                            <h3>Person 1</h3>
                            <p>Leader</p>
                            <p>Email</p>
                        </div>
                    </article>

                    <div class="member-grid">
                        <article class="info-card member-card">
                            <div class="circle-avatar medium"></div>
                            <div class="member-details">
                                <h3>Person 2</h3>
                                <p>Member</p>
                                <p>Email</p>
                            </div>
                        </article>

                        <article class="info-card member-card">
                            <div class="circle-avatar medium"></div>
                            <div class="member-details">
                                <h3>Person 3</h3>
                                <p>Member</p>
                                <p>Email</p>
                            </div>
                        </article>
                    </div>
                </section>
            </section>
        </main>

        <aside class="right-rail">
            <nav class="side-tabs" aria-label="Group sections">
                <button class="tab tab-group-info active" type="button">Group Information</button>
                <button class="tab tab-project-breakdown" id="projectBreakdownTab" type="button">Project Breakdown</button>
            </nav>
        </aside>
    </div>

    <script src="s.leadergrpviewing.js"></script>
</body>
</html>
