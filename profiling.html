<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profiling</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="profiling.css">
</head>
<body>
<div class="hex-wrap">
  <div class="hex-left"></div>
  <div class="hex-mid">
    <div class="hex-container">
        <div class="title">
            <h1>WELCOME TO</h1>
            <img src="Title.png" class="title-image" alt="Logo">
            <h2>Where Teamwork Thrives!</h2>
        </div>
        <div class="selection">
            <h1>I am a...</h1>
        </div>
            <div class="options">
                <div class="option-professor">
                    <h2>Professor</h2>
                </div>
                <div class="option-student">
                    <h2>Student</h2>
                </div>
            </div>
    </div>
  </div>
  <div class="hex-right"></div>
</div>
    <script src="profiling.js"></script>
</body>
</html>
